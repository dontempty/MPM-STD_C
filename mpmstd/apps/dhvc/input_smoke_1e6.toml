# DHVC (PaScaL_TCS Fig 7) — OB, small-grid CPU verification, Ra=1e5.
#   x = streamwise/vertical/gravity (periodic, Lx=8H)  ← buoyancy on U
#   y = spanwise (periodic, Ly=4H)
#   z = wall-normal (hot z=0 θ=+0.5, cold z=Lz θ=−0.5), tanh-stretched
# Run: mpirun --oversubscribe -np 4 build/cpu/mpmstd/bin/apps/dhvc \
#        mpmstd/apps/dhvc/input_ra1e5.toml

[domain]
Lx = 8.0
Ly = 4.0
Lz = 1.0

[mesh]
n1m = 64
n2m = 32
n3m = 48

[mpi]
np1 = 2
np2 = 2
np3 = 1

[uniform_mesh]
uniform1 = 1
uniform2 = 1
uniform3 = 0

[mesh_stretch]
gamma1 = 0.0
gamma2 = 0.0
gamma3 = 2.6

[physics]
Ra = 1.0e6
Pr = 0.7

[topology]
x = "periodic"
y = "periodic"
z = "wall"

[bc.z.minus]
T = 0.5      # hot wall (z=0)
[bc.z.plus]
T = -0.5     # cold wall (z=Lz)

[time]
t_start  = 0.0
t_end    = 400.0
dt_start = 0.02
MaxCFL   = 0.5
n_steps  = 4000

[init]
perturb = 0.05

[output]
dir_stats   = "mpmstd/apps/dhvc/stats_sm_1e6/"
nmonitor    = 100
nstat_start = 1500
nstat       = 10
