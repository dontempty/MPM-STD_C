# DHVC Ra=1e5 — FFT-friendly grid (x,y powers of 2 for fast FFTW; wall z=96 =
# paper resolution, the BL direction that sets Re_δ*). np 8x4x2=64 (1 node).
[domain]
Lx = 8.0
Ly = 4.0
Lz = 1.0
[mesh]
n1m = 256
n2m = 128
n3m = 96
[mpi]
np1 = 4
np2 = 4
np3 = 2
[uniform_mesh]
uniform1 = 1
uniform2 = 1
uniform3 = 0
[mesh_stretch]
gamma1 = 0.0
gamma2 = 0.0
gamma3 = 2.6
[physics]
Ra = 1.0e5
Pr = 0.7
[topology]
x = "periodic"
y = "periodic"
z = "wall"
[bc.z.minus]
T = 0.5
[bc.z.plus]
T = -0.5
[time]
t_start  = 0.0
t_end    = 500.0
dt_start = 0.02
MaxCFL   = 0.4
n_steps  = 12000
[init]
perturb = 0.05
[output]
dir_stats   = "mpmstd/apps/dhvc/stats_cpu_1e5/"
nmonitor    = 500
nstat_start = 6000
nstat       = 10
